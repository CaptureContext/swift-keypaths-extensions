version: 1
builder:
  configs:
  - platform: ios
    scheme: KeyPathsExtensions

  - platform: macos-spm
    scheme: KeyPathsExtensions

  - platform: macos-xcodebuild
    scheme: KeyPathsExtensions

  - platform: tvos
    scheme: KeyPathsExtensions

  - platform: watchos
    scheme: KeyPathsExtensions

  - platform: linux
    scheme: KeyPathsExtensions
    swift_version: '5.9'

  - platform: linux
    scheme: KeyPathsExtensions
    swift_version: '6.0'

  - platform: ios
    scheme: KeyPathMapper

  - platform: macos-spm
    scheme: KeyPathMapper

  - platform: macos-xcodebuild
    scheme: KeyPathMapper

  - platform: tvos
    scheme: KeyPathMapper

  - platform: watchos
    scheme: KeyPathMapper

  - platform: linux
    scheme: KeyPathsExtensions
    swift_version: '5.9'

  - platform: linux
    scheme: KeyPathsExtensions
    swift_version: '6.0'

  - documentation_targets:
    - KeyPathsExtensions
    - KeyPathMapper
